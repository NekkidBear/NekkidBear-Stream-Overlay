<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechBear — Chrome Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --cur: #00f5ff;
  --font-hud:  'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --lt: 0.5s;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:1920px; height:1080px;
  background: transparent !important;
  overflow: hidden;
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════════════════════════════
   VIDEO FRAME CHROME
   3×2 GRID LAYOUT — 1920×1080 canvas
   ┌─────────────┬──────────────────┬───────────────┐
   │   Avatar    │  Shared Content  │   Secondary   │
   │   360×580   │    888×580       │   620×580     │
   ├─────────────┼──────────────────┼───────────────┤
   │  BearBits   │     Chat         │     Boss      │
   │   360×454   │    888×454       │   620×454     │
   └─────────────┴──────────────────┴───────────────┘
   Margin: 20px outer · 6px gutter
═══════════════════════════════════════════════════════════════ */

:root {
  --m:  20px;
  --g:  6px;
  --c1: 360px;
  --c2: 888px;
  --c3: 620px;
  --r1: 580px;
  --r2: 454px;
  --x1: 20px;
  --x2: 386px;
  --x3: 1280px;
  --y1: 20px;
  --y2: 606px;
}

.vid-frame {
  position: fixed;
  z-index: 10;
  border: 2px solid var(--cur);
  box-shadow: 0 0 14px var(--cur), inset 0 0 6px rgba(0,0,0,0.4);
  background: transparent;
  transition:
    left   var(--lt) cubic-bezier(0.4,0,0.2,1),
    top    var(--lt) cubic-bezier(0.4,0,0.2,1),
    right  var(--lt) cubic-bezier(0.4,0,0.2,1),
    bottom var(--lt) cubic-bezier(0.4,0,0.2,1),
    width  var(--lt) cubic-bezier(0.4,0,0.2,1),
    height var(--lt) cubic-bezier(0.4,0,0.2,1),
    opacity var(--lt) ease,
    border-color var(--lt) ease,
    box-shadow var(--lt) ease;
  pointer-events: none;
}
.vid-frame.hidden { opacity:0; pointer-events:none; }

.vid-frame .frame-label {
  position: absolute; top:-28px; left:-2px;
  background: rgba(0,0,0,0.88);
  border: 1px solid var(--cur); border-bottom: none;
  padding: 2px 14px;
  font-family: var(--font-hud); font-size: 0.62rem;
  letter-spacing: 0.22em; color: var(--cur);
  text-shadow: 0 0 6px var(--cur); white-space: nowrap;
  transition: border-color var(--lt), color var(--lt), text-shadow var(--lt);
}
.vid-frame::before, .vid-frame::after {
  content:''; position:absolute; width:12px; height:12px;
  border-color:var(--cur); border-style:solid;
  transition: border-color var(--lt);
}
.vid-frame::before { top:-2px; left:-2px; border-width:2px 0 0 2px; }
.vid-frame::after  { bottom:-2px; right:-2px; border-width:0 2px 2px 0; }

/* LAYOUTS */
body.layout-full #frame-avatar    { left:var(--x1); top:var(--y1); width:var(--c1); height:var(--r1); }
body.layout-full #frame-content   { left:var(--x2); top:var(--y1); width:var(--c2); height:var(--r1); }
body.layout-full #frame-secondary { left:var(--x3); top:var(--y1); width:var(--c3); height:var(--r1); }
body.layout-full #frame-bearbits  { left:var(--x1); top:var(--y2); width:var(--c1); height:var(--r2); }
body.layout-full #frame-chat      { left:var(--x2); top:var(--y2); width:var(--c2); height:var(--r2); }
body.layout-full #frame-boss      { left:var(--x3); top:var(--y2); width:var(--c3); height:260px; }
body.layout-full #frame-milestone { left:var(--x3); top:872px;     width:var(--c3); height:176px; opacity:1; }
body.layout-full #frame-secondary { opacity:1; }

body.layout-merged #frame-avatar    { left:var(--x1); top:var(--y1); width:var(--c1); height:var(--r1); }
body.layout-merged #frame-content   { left:var(--x2); top:var(--y1); width:1514px; height:var(--r1); }
body.layout-merged #frame-secondary { opacity:0; pointer-events:none; }
body.layout-merged #frame-bearbits  { left:var(--x1); top:var(--y2); width:var(--c1); height:var(--r2); }
body.layout-merged #frame-chat      { left:var(--x2); top:var(--y2); width:var(--c2); height:var(--r2); }
body.layout-merged #frame-boss      { left:var(--x3); top:var(--y2); width:var(--c3); height:260px; }
body.layout-merged #frame-milestone { left:var(--x3); top:872px;     width:var(--c3); height:176px; opacity:1; }

body.layout-no-boss #frame-avatar    { left:var(--x1); top:var(--y1); width:var(--c1); height:var(--r1); }
body.layout-no-boss #frame-content   { left:var(--x2); top:var(--y1); width:var(--c2); height:var(--r1); }
body.layout-no-boss #frame-secondary { left:var(--x3); top:var(--y1); width:var(--c3); height:var(--r1); }
body.layout-no-boss #frame-bearbits  { left:var(--x1); top:var(--y2); width:var(--c1); height:var(--r2); }
body.layout-no-boss #frame-chat      { left:var(--x2); top:var(--y2); width:1514px; height:var(--r2); }
body.layout-no-boss #frame-boss      { opacity:0; pointer-events:none; }
body.layout-no-boss #frame-milestone { left:var(--x3); top:var(--y2); width:var(--c3); height:var(--r2); opacity:1; }

body.layout-vtuber-focus #frame-avatar    { left:var(--x1); top:var(--y1); width:580px; height:1040px; }
body.layout-vtuber-focus #frame-content   { left:612px; top:var(--y1); width:668px; height:502px; }
body.layout-vtuber-focus #frame-secondary { left:1286px; top:var(--y1); width:614px; height:502px; }
body.layout-vtuber-focus #frame-bearbits  { left:612px; top:528px; width:340px; height:532px; }
body.layout-vtuber-focus #frame-chat      { left:958px; top:528px; width:376px; height:532px; }
body.layout-vtuber-focus #frame-boss      { left:1340px; top:528px; width:560px; height:320px; }
body.layout-vtuber-focus #frame-milestone { left:1340px; top:854px; width:560px; height:206px; opacity:1; }

body.layout-screen-share #frame-avatar    { left:var(--x1); top:var(--y1); width:var(--c1); height:var(--r1); }
body.layout-screen-share #frame-content   { left:var(--x2); top:var(--y1); width:1514px; height:var(--r1); }
body.layout-screen-share #frame-secondary { opacity:0; pointer-events:none; }
body.layout-screen-share #frame-bearbits  { left:var(--x1); top:var(--y2); width:var(--c1); height:var(--r2); }
body.layout-screen-share #frame-chat      { left:var(--x2); top:var(--y2); width:var(--c2); height:var(--r2); }
body.layout-screen-share #frame-boss      { left:var(--x3); top:var(--y2); width:var(--c3); height:260px; }
body.layout-screen-share #frame-milestone { left:var(--x3); top:872px;     width:var(--c3); height:176px; opacity:1; }

/* CHAT */
#frame-chat {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-color: rgba(0,245,255,0.55);
  box-shadow: none;
  background: #000;           /* solid black — no bleed-through from matrix */
  pointer-events: none;
}
#frame-chat .frame-label {
  border-color: rgba(0,245,255,0.55);
  color: rgba(0,245,255,0.8);
}

/* Connection status bar — sits at top of chat frame */
#chat-status {
  flex-shrink: 0;
  padding: 3px 10px;
  font-family: var(--font-hud);
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  transition: color 0.4s, background 0.4s;
}
#chat-status.connected    { color: #39ff14; background: rgba(57,255,20,0.06); }
#chat-status.disconnected { color: #ff1493; background: rgba(255,20,147,0.06); }

#chat-messages {
  flex: 1;
  overflow: hidden;
  padding: 8px 10px 10px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
}

.chat-msg {
  font-size: 0.8rem;
  line-height: 1.45;
  animation: msgIn 0.25s ease;
  word-wrap: break-word;
  word-break: break-word;
}
.chat-msg .chatter {
  font-family: var(--font-hud);
  font-weight: 700;
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  margin-right: 6px;
}
.chat-msg.bot-reply .chatter { color: #ff6a00 !important; }

/* High-contrast white text for all message bodies */
.chat-msg .msg-text {
  color: #ffffff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}
/* Slightly dimmed for bot replies so they feel like system text */
.chat-msg.bot-reply .msg-text {
  color: rgba(255,255,255,0.8);
  font-style: italic;
}
/* System entries (alerts logged to chat) */
.chat-msg.system-entry .chatter {
  color: rgba(0,245,255,0.5) !important;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
}
.chat-msg.system-entry .msg-text {
  color: rgba(255,255,255,0.55);
  font-size: 0.74rem;
}

/* ═══════════════════════════════════════════════════════════
   CENTERED FLASH ALERT OVERLAY
   Appears over everything for follows, subs, tips, shoutouts.
   Transparent full-screen backdrop + black center box with
   the Gymnarctos pawprint icon.
═══════════════════════════════════════════════════════════ */
#alert-overlay {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  /* Backdrop — transparent by default, dims slightly during alert */
  background: rgba(0,0,0,0);
  transition: background 0.35s ease;
}
#alert-overlay.active {
  background: rgba(0,0,0,0.45);
}

#alert-box {
  width: 580px;
  background: #000;
  border: 2px solid var(--cur);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.8),
    0 0 40px var(--cur),
    0 0 100px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 40px 32px;
  gap: 10px;
  /* Start hidden/scaled down */
  opacity: 0;
  transform: scale(0.88);
  transition:
    opacity 0.35s cubic-bezier(0.22,1,0.36,1),
    transform 0.35s cubic-bezier(0.22,1,0.36,1),
    border-color var(--lt),
    box-shadow var(--lt);
}
#alert-overlay.active #alert-box {
  opacity: 1;
  transform: scale(1);
}

/* Pawprint logo — PNG with black bg knocked out via screen blend.
   The logo is cyan on black; screen mode makes black = transparent
   and preserves the cyan pixels. Glow is added via filter. */
#alert-pawprint {
  width: 80px; height: 80px;
  object-fit: contain;
  mix-blend-mode: screen;          /* black bg disappears, cyan shines through
                                     (we hue-rotate the cyan to whatever --cur is) */
  /* hue-rotate will be updated by setColor(); include zero so transition works */
  filter: hue-rotate(0deg) drop-shadow(0 0 14px var(--cur)) drop-shadow(0 0 5px var(--cur));
  animation: pawPulse 1.8s ease-in-out infinite;
  transition: filter var(--lt);
  image-rendering: crisp-edges;
}

#alert-type {
  font-family: var(--font-hud);
  font-size: 0.62rem;
  letter-spacing: 0.45em;
  color: var(--cur);
  text-shadow: 0 0 8px var(--cur);
  text-transform: uppercase;
  margin-top: 4px;
  transition: color var(--lt), text-shadow var(--lt);
}
#alert-name {
  font-family: var(--font-hud);
  font-weight: 900;
  font-size: 2rem;
  color: #fff;
  letter-spacing: 0.06em;
  text-align: center;
  line-height: 1.1;
  text-shadow: 0 0 20px rgba(255,255,255,0.3);
}
#alert-detail {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.12em;
  text-align: center;
  min-height: 1.2em;
}

/* Decorative corner ticks on alert box */
#alert-box::before, #alert-box::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--cur); border-style: solid;
  transition: border-color var(--lt);
}
#alert-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
#alert-box::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
#alert-box { position: relative; } /* needed for ::before/::after */

/* ── Milestone frame — sits below boss cam ── */
/* Boss cam is resized in layout classes to 260px tall;
   milestone frame fills the remaining 176px of that column. */
#frame-milestone {
  position: fixed;
  z-index: 10;
  border: 2px solid var(--cur);
  box-shadow: 0 0 10px var(--cur);
  background: #000;
  overflow: hidden;
  pointer-events: none;
  transition:
    border-color var(--lt), box-shadow var(--lt),
    opacity var(--lt);
}
#frame-milestone .frame-label {
  position: absolute; top: -28px; left: -2px;
  background: rgba(0,0,0,0.88);
  border: 1px solid var(--cur); border-bottom: none;
  padding: 2px 14px;
  font-family: var(--font-hud); font-size: 0.62rem;
  letter-spacing: 0.22em; color: var(--cur);
  text-shadow: 0 0 6px var(--cur);
  transition: border-color var(--lt), color var(--lt);
}
/* The iframe inside fills the frame — pointer-events re-enabled
   so Joystick's own JS can run inside it */
#milestone-iframe {
  width: 100%; height: 100%;
  border: none;
  pointer-events: auto;
  display: block;
}

/* TTS INDICATOR */
#tts-indicator {
  position:fixed; bottom:38px; right:20px; z-index:31; width:300px;
  background:rgba(0,0,0,0.9); border-top:2px solid var(--cur);
  padding:7px 12px; display:flex; align-items:center; gap:10px;
  opacity:0; transition:opacity 0.25s; pointer-events:none;
}
#tts-indicator.speaking { opacity:1; }
.tts-wave { display:flex; gap:3px; align-items:center; flex-shrink:0; }
.tts-wave span { display:block; width:3px; background:var(--cur); border-radius:2px; animation:wave 0.6s ease-in-out infinite; }
.tts-wave span:nth-child(1){height:8px;  animation-delay:0s;}
.tts-wave span:nth-child(2){height:16px; animation-delay:0.1s;}
.tts-wave span:nth-child(3){height:22px; animation-delay:0.2s;}
.tts-wave span:nth-child(4){height:14px; animation-delay:0.15s;}
.tts-wave span:nth-child(5){height:8px;  animation-delay:0.05s;}
#tts-text { font-size:0.72rem; color:rgba(255,255,255,0.8); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* CORNER CHROME */
.corner {
  position:fixed; z-index:40; width:50px; height:50px;
  border-color:var(--cur); border-style:solid; opacity:0.55;
  transition:border-color var(--lt);
}
.corner.tl { top:12px; left:12px; border-width:2px 0 0 2px; }
.corner.tr { top:12px; right:12px; border-width:2px 2px 0 0; }
.corner.bl { bottom:32px; left:12px; border-width:0 0 2px 2px; }
.corner.br { bottom:32px; right:12px; border-width:0 2px 2px 0; }

/* TICKER */
.ticker-wrap {
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:rgba(0,0,0,0.88); border-top:1.5px solid var(--cur);
  padding:6px 0; overflow:hidden; height:32px;
  transition: border-color var(--lt);
}
.ticker-track { display:flex; white-space:nowrap; animation:ticker 35s linear infinite; }
.ticker-item { font-size:0.7rem; letter-spacing:0.18em; color:var(--cur); text-shadow:0 0 5px var(--cur); padding:0 60px; }
.ticker-item::before { content:'▶  '; opacity:0.5; }

/* LAYOUT INDICATOR */
#layout-indicator {
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  z-index:41; font-family:var(--font-hud); font-size:0.58rem;
  letter-spacing:0.3em; color:rgba(0,245,255,0.4);
  text-transform:uppercase; pointer-events:none;
  transition:color var(--lt);
}
#layout-indicator.flash { color:rgba(0,245,255,0.9); }

/* DAD JOKE WIDGET */
#dadjoke-widget {
  position: fixed;
  left: 50%; bottom: 90px;
  transform: translateX(-50%);
  z-index: 35;
  width: 900px;
  background: rgba(0,0,0,0.92);
  border: 2px solid var(--cur);
  box-shadow: 0 0 30px var(--cur), 0 0 80px rgba(0,245,255,0.12);
  padding: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#dadjoke-widget.visible { opacity: 1; }

.dj-header {
  background: var(--cur);
  padding: 5px 20px;
  display: flex; align-items: center; gap: 10px;
}
.dj-header-icon { font-size: 1rem; }
.dj-header-label {
  font-family: var(--font-hud); font-weight: 900;
  font-size: 0.65rem; letter-spacing: 0.35em;
  color: #000; text-transform: uppercase;
}
.dj-header-user {
  font-family: var(--font-mono); font-size: 0.65rem;
  color: rgba(0,0,0,0.65); margin-left: auto;
  letter-spacing: 0.1em;
}
.dj-body { padding: 16px 24px 20px; }
.dj-setup {
  font-family: var(--font-hud);
  font-size: clamp(0.9rem, 1.4vw, 1.15rem);
  color: rgba(255,255,255,0.75);
  line-height: 1.5; letter-spacing: 0.03em;
  min-height: 1.5em;
}
.dj-punchline {
  font-family: var(--font-hud); font-weight: 900;
  font-size: clamp(1rem, 1.8vw, 1.45rem);
  color: #fff; line-height: 1.4;
  letter-spacing: 0.03em;
  margin-top: 10px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  text-shadow: 0 0 16px var(--cur);
}
.dj-punchline.revealed { opacity: 1; transform: none; }
.dj-punchline.no-setup { margin-top: 0; }

/* SPOTIFY BAR */
#spotify-bar {
  position: fixed;
  bottom: 32px; left: 0; right: 0;
  z-index: 39;
  height: 0; overflow: hidden;
  background: rgba(0,0,0,0.9);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  transition: height 0.4s cubic-bezier(0.4,0,0.2,1);
}
#spotify-bar.visible { height: 32px; }
#spotify-art { width:22px; height:22px; border-radius:2px; object-fit:cover; opacity:0.85; flex-shrink:0; }
#spotify-icon { font-size:0.85rem; flex-shrink:0; color:#1DB954; filter:drop-shadow(0 0 4px #1DB954); }
#spotify-track {
  font-family:var(--font-mono); font-size:0.72rem;
  color:rgba(255,255,255,0.7); letter-spacing:0.08em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#spotify-track strong { color:#fff; font-weight:normal; font-family:var(--font-hud); font-size:0.68rem; }
#spotify-progress-wrap { flex:1; height:2px; background:rgba(255,255,255,0.1); border-radius:1px; overflow:hidden; flex-shrink:0; max-width:200px; }
#spotify-progress-bar { height:100%; background:#1DB954; transition:width 8s linear; width:0%; }

/* ANIMATIONS */
@keyframes alertIn   { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
@keyframes alertOut  { from{opacity:1;transform:scale(1)}    to{opacity:0;transform:scale(0.92)} }
@keyframes pawPulse  {
  0%,100% { transform: scale(1);    filter: drop-shadow(0 0 10px var(--cur)) drop-shadow(0 0 4px var(--cur)); }
  50%     { transform: scale(1.08); filter: drop-shadow(0 0 22px var(--cur)) drop-shadow(0 0 8px var(--cur)); }
}
@keyframes msgIn     { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
@keyframes wave      { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1.2)} }
@keyframes ticker    { from{transform:translateX(0)} to{transform:translateX(-50%)} }
</style>
</head>
<body class="layout-full">

<!-- Corner chrome -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Layout indicator -->
<div id="layout-indicator">◈ FULL LAYOUT</div>

<!-- Video frame borders -->
<div class="vid-frame" id="frame-avatar">
  <span class="frame-label">◈ AVATAR</span>
</div>
<div class="vid-frame" id="frame-content">
  <span class="frame-label">◈ SHARED CONTENT</span>
</div>
<div class="vid-frame" id="frame-secondary">
  <span class="frame-label">◈ SECONDARY CONTENT</span>
</div>
<div class="vid-frame" id="frame-bearbits">
  <span class="frame-label">◈ BEAR-BITS CAM</span>
</div>
<div class="vid-frame" id="frame-chat">
  <span class="frame-label">◈ CHAT</span>
  <div id="chat-status" class="disconnected">● CONNECTING…</div>
  <div id="chat-messages"></div>
</div>
<div class="vid-frame" id="frame-boss">
  <span class="frame-label">◈ BOSS CAM</span>
</div>

<!-- Milestone / tip goal frame — Joystick URL loaded in iframe.
     Set JOYSTICK_MILESTONE_URL in CONFIG to activate.
     Leave blank to show a placeholder label only. -->
<div id="frame-milestone">
  <span class="frame-label">◈ TIP GOAL &amp; MILESTONES</span>
  <iframe id="milestone-iframe" src="" title="Tip Goal"></iframe>
</div>

<!-- Centered flash alert overlay — follow / sub / tip / shoutout -->
