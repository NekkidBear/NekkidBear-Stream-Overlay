<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechBear — Background</title>
<style>
  :root { --cur: #00f5ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1920px; height:1080px; background:#000; overflow:hidden; }
  canvas { position:fixed; inset:0; z-index:0; }
  #scanlines {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: repeating-linear-gradient(to bottom,
      transparent 0 3px, rgba(0,0,0,0.16) 3px 4px);
  }
  #grid { position:fixed; bottom:0; left:0; right:0; height:36%; z-index:2; pointer-events:none; overflow:hidden; }
  #grid svg { width:100%; height:100%; }
  #vignette {
    position:fixed; inset:0; z-index:3; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.68) 100%);
  }
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div id="scanlines"></div>
<div id="grid"><svg id="gridSvg" viewBox="0 0 1920 400" preserveAspectRatio="none"></svg></div>
<div id="vignette"></div>
<script>
// ── Palette ──────────────────────────────────────────────────────
const PALETTE = ['#00f5ff','#ff00ff','#bf00ff','#39ff14','#ff6a00','#ff1493','#00ffbf'];
let ci = 0;
function setColor(h) {
  document.documentElement.style.setProperty('--cur', h);
  buildGrid(h);
}
setInterval(() => { ci = (ci+1) % PALETTE.length; setColor(PALETTE[ci]); }, 5000);
setColor(PALETTE[0]);

// ── Matrix rain ───────────────────────────────────────────────────
const canvas = document.getElementById('matrix');
const ctx    = canvas.getContext('2d');
canvas.width = 1920; canvas.height = 1080;
const FS = 14;
const cols  = Math.floor(1920 / FS);
const drops = Array(cols).fill(1);

function drawMatrix() {
  const h = getComputedStyle(document.documentElement).getPropertyValue('--cur').trim();
  const r = parseInt(h.slice(1,3),16);
  const g = parseInt(h.slice(3,5),16);
  const b = parseInt(h.slice(5,7),16);
  ctx.fillStyle = 'rgba(0,0,0,0.053)';
  ctx.fillRect(0, 0, 1920, 1080);
  ctx.font = `${FS}px 'Courier New', monospace`;
  for (let i = 0; i < drops.length; i++) {
    const ch = Math.random() < 0.5 ? '0' : '1';
    const y  = drops[i] * FS;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillText(ch, i * FS, y);
    if (drops[i] > 1) {
      ctx.fillStyle = `rgba(${r},${g},${b},0.72)`;
      ctx.fillText(Math.random() < 0.5 ? '0' : '1', i * FS, y - FS);
    }
    if (y > 1080 && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 46);

// ── Perspective grid ──────────────────────────────────────────────
function buildGrid(color) {
  const svg = document.getElementById('gridSvg');
  const W = 1920, H = 400;
  let d = '';
  for (let i = 0; i <= 12; i++) {
    const t = i/12, e = t*t*t, y = H*e, op = 0.12 + e*0.5;
    d += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${color}" stroke-width="${0.4+e*1.2}" opacity="${op}"/>`;
  }
  for (let i = 0; i <= 28; i++) {
    const bx = (i/28)*W, op = 0.08 + 0.28*Math.abs((i-14)/14);
    d += `<line x1="960" y1="0" x2="${bx}" y2="${H}" stroke="${color}" stroke-width="0.7" opacity="${op}"/>`;
  }
  svg.innerHTML = d;
}
</script>
</body>
</html>
